<div>
	<form #labtechician="ngForm" nz-form>
		<nz-spin [nzSpinning]="isSpinning">
			<div nz-row>

				<!-- DOCTOR_ID -->
				<div nz-col nzSpan="24" class="form-group">
					<nz-form-item>
						<nz-form-label nzNoColon>
							Doctor
						</nz-form-label>
						<nz-form-control nzHasFeedback nzErrorTip="Select Doctor">
							<nz-select [(ngModel)]="data.doctor_id" name="doctorid" nzPlaceHolder="Select Doctor"
								required>
								<nz-option *ngFor="let doctor of doctors" [nzValue]="doctor.id"
									[nzLabel]="doctor.name"></nz-option>
							</nz-select>
						</nz-form-control>
					</nz-form-item>
				</div>

				<!-- CONSULTATION_MODE -->
				<div nz-col nzSpan="12" class="form-group">
					<nz-form-item>
						<nz-form-label nzNoColon>
							Consultation Mode
						</nz-form-label>
						<nz-form-control nzHasFeedback nzErrorTip="Select Consultation Mode">
							<nz-select nzAllowClear="true" name="PAYMENT" [(ngModel)]="data.consultation_mode"
								nzPlaceHolder="Select Payment Status">
								<nz-option nzValue="ON" nzLabel="Online"></nz-option>
								<nz-option nzValue="OF" nzLabel="Offline"></nz-option>
							</nz-select>
						</nz-form-control>
					</nz-form-item>
				</div>

				<!-- CONSULTATION_TYPE_ID -->
				<div nz-col nzSpan="12" class="form-group">
					<nz-form-item>
						<nz-form-label nzNoColon>
							Consultation Type
						</nz-form-label>
						<nz-form-control nzHasFeedback nzErrorTip="Select Consultation Type">
							<nz-select [(ngModel)]="data.consultation_type_id" name="consultationType"
								nzPlaceHolder="Select Consultation Type" required>
								<nz-option *ngFor="let type of consultationTypes" [nzValue]="type.id"
									[nzLabel]="type.name"></nz-option>
							</nz-select>
						</nz-form-control>
					</nz-form-item>
				</div>

				<div nz-col nzSpan="12" class="form-group">
					<nz-form-item>
						<nz-form-label nzRequired nzNoColon>
							Bill Amount
						</nz-form-label>
						<nz-form-control nzHasFeedback nzErrorTip="Enter Bill Amount">
							<input [(ngModel)]="data.bill_amount" nz-input name="billAmount" maxlength="10"
								(keypress)="commonFunction.omit($event)" placeholder="Enter Bill Amount" required>
						</nz-form-control>
					</nz-form-item>
				</div>

				<!-- TAX_ID -->
				<div nz-col nzSpan="12" class="form-group">
					<nz-form-item>
						<nz-form-label nzRequired nzNoColon>
							Tax
						</nz-form-label>
						<nz-form-control nzHasFeedback nzErrorTip="Select Tax">
							<nz-select [(ngModel)]="data.tax_id" name="taxid" nzPlaceHolder="Select Tax" required
								(ngModelChange)="onTaxChange($event)">
								<nz-option *ngFor="let tax of taxes" [nzValue]="tax.id"
									[nzLabel]="tax.tax_name"></nz-option>
							</nz-select>
						</nz-form-control>
					</nz-form-item>
				</div>

				<!-- TOTAL_AMOUNT -->
				<div nz-col nzSpan="12" class="form-group">
					<nz-form-item>
						<nz-form-label nzNoColon>
							Total Amount
						</nz-form-label>
						<nz-form-control nzHasFeedback nzErrorTip="Enter Total Amount">
							<!-- disabled  readonly -->
							<input [(ngModel)]="data.total_amount" nz-input name="totalAmount" maxlength="20"
								placeholder="Enter Total Amount">
						</nz-form-control>
					</nz-form-item>
				</div>


				<!-- IS_ACTIVE -->
				<div nz-col nzSpan="12" class="form-group">
					<nz-form-item>
						<nz-form-label nzRequired nzNoColon>
							Is Active
						</nz-form-label>
						<nz-form-control>
							<nz-switch [(ngModel)]="data.is_active" name="isActive" nzCheckedChildren="Active"
								nzUnCheckedChildren="Inactive"></nz-switch>
						</nz-form-control>
					</nz-form-item>
				</div>

				<!-- Footer Buttons -->
			</div>

		</nz-spin>
	</form>
	<div class="footer">
		<button (click)="close()" type="button" nz-button class="ant-btn" style="margin-right: 8px;">
			<span>Cancel</span>
		</button>
		<button *ngIf="!data.id" [nzDropdownMenu]="menu" [nzLoading]="isSpinning" (click)="save(false, labtechician)"
			type="button" class="ant-btn ant-btn-primary" nz-button nz-dropdown>
			<span>Save & Close</span>
		</button>
		<nz-dropdown-menu #menu="nzDropdownMenu">
			<ul nz-menu>
				<li nz-menu-item class="menuc" style="border-radius: 4px; background-color: #40a9ff;">
					<a (click)="save(true, labtechician)" style="color:white">
						Save & New
					</a>
				</li>
			</ul>
		</nz-dropdown-menu>
		<button *ngIf="data.id" [nzLoading]="isSpinning" (click)="save(false, labtechician)" type="button"
			class="ant-btn ant-btn-primary" nz-button>
			<span>Update & Close</span>
		</button>
	</div>
</div>
