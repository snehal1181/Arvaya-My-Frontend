<div nz-row nzType="flex">
  <div nz-col nzXs="24" nzSm="24" nzMd="12" nzLg="12" nzXl="12" style="text-align: left">
    <div class="formname">
      <b>
        <span (click)="back()" nz-icon nzType="arrow-left" nzTheme="outline"
          style="font-weight: bold; cursor: pointer"></span>&nbsp;&nbsp; {{ formTitle }}
      </b>
    </div>
  </div>

  <div nz-col nzXs="24" nzSm="24" nzMd="12" nzLg="12" nzXl="12">
    <div style="display: flex; justify-content: flex-end; align-items: center">
      <button nz-button nz-tooltip nzTooltipTitle="Excel" nzTooltipPlacement="top" (click)="importInExcel()"
        nzType="primary" style="margin-right: 10px">
        <i nz-icon nzType="file-excel" nzTheme="outline"></i>
      </button>

      <button nz-button nzTooltipTitle="Filter" [nzType]="isFilterApplied" nzTooltipPlacement="top" nz-tooltip
        (click)="showFilter()">
        <i nz-icon nzType="filter"></i>
      </button>

      <form nz-form [nzLayout]="'inline'">
        <nz-form-item>
          <nz-input-group nzSearch [nzAddOnAfter]="suffixIconButton">
            <input type="text" name="search" (keyup)="keyup($event)" [(ngModel)]="searchText" nz-input
              placeholder="Search" />
          </nz-input-group>
          <ng-template #suffixIconButton>
            <button nz-button nzType="primary" (click)="search(true)" nzSearch>
              <i nz-icon nzType="search"></i>
            </button>
          </ng-template>
        </nz-form-item>
      </form>
    </div>
  </div>
</div>

<div nz-row>
  <div nz-col nzSpan="24">
    <div class="filter {{ filterClass }}">
      <div class="filter-box">
        <form nz-form>
          <div nz-row>
            <!-- Hospital Filter -->
            <div nz-col [nzSpan]="6">
              <nz-form-item>
                <nz-form-label nzNoColon>Hospital</nz-form-label>
                <nz-form-control>
                  <nz-select [(ngModel)]="hospitalId" name="hospitalId" style="width: 100%" nzShowSearch nzAllowClear
                    nzPlaceHolder="Select Hospital" (ngModelChange)="onHospitalChange($event)">
                    <nz-option *ngFor="let hospital of hospitalIdList" [nzValue]="hospital.id"
                      [nzLabel]="hospital.name"></nz-option>
                  </nz-select>
                </nz-form-control>
              </nz-form-item>
            </div>

            <!-- Doctor Filter -->
            <div nz-col [nzSpan]="4">
              <nz-form-item>
                <nz-form-label nzNoColon>Doctor</nz-form-label>
                <nz-form-control>
                  <nz-select [(ngModel)]="doctorId" name="doctorId" style="width: 100%" nzShowSearch nzAllowClear
                    nzMode="multiple" nzPlaceHolder="Select Doctor" [nzDisabled]="!hospitalId">
                    <nz-option *ngFor="let doctor of doctorIdList" [nzValue]="doctor.ID"
                      [nzLabel]="doctor.NAME"></nz-option>
                  </nz-select>
                </nz-form-control>
              </nz-form-item>
            </div>

            <!-- Apply and Clear Buttons -->
            <div nz-col [nzSpan]="4" style="display: flex; gap: 10px; margin-top: 25px">
              <button nz-button [nzLoading]="isSpinning" nzType="primary" (click)="applyFilter()">
                <i nz-icon nzType="filter"></i>
              </button>
              <button nz-button nzType="primary" [nzLoading]="isSpinning" (click)="clearFilter()">
                <i nz-icon nzType="close"></i>
              </button>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

<div nz-row style="margin-top: 10px">
  <div nz-col nzSpan="24">
    <nz-table class="my-table" nzBordered #table nzShowSizeChanger [nzFrontPagination]="false" [nzData]="dataList"
      [nzLoading]="loadingRecords" [nzSize]="'small'" [nzTotal]="totalRecords" [(nzPageIndex)]="pageIndex"
      [(nzPageSize)]="pageSize" (nzPageIndexChange)="search()" (nzPageSizeChange)="search(true)"
      (nzQueryParams)="sort($event)" [nzScroll]="{'x':'100px'}">
      <thead>
        <tr>
          <!-- Appointment Name -->
          <!-- <th nzWidth="40px" style="text-align: center; font-weight: bold" nzColumnKey="APPOINTMENT_NAME"
                        [nzSortFn]="true" [nzFilterFn]="true" nzCustomFilter>
                        Appointment Name
                        <nz-filter-trigger [(nzVisible)]="appointmentVisible" [nzDropdownMenu]="appointmentDropdown">
                            <span nz-icon nzType="filter" nzTheme="fill"></span>
                        </nz-filter-trigger>
                    </th>
                  -->

          <!-- Hospital Name -->
          <!-- Date -->
          <th nzWidth="100px" style="text-align: center; font-weight: bold" nzColumnKey="DATE" [nzSortFn]="true"
            [nzFilterFn]="true" nzCustomFilter>
            Date
            <nz-filter-trigger [(nzVisible)]="dateVisible" [nzDropdownMenu]="dateshow">
              <span nz-icon nzType="filter" nzTheme="fill"></span>
            </nz-filter-trigger>
          </th>
          <!-- Feedback Type -->
          <th nzWidth="160px" style="text-align: center; font-weight: bold" nzColumnKey="FEEDBACK_TYPE"
            [nzSortFn]="true" [nzFilterFn]="true" nzCustomFilter>
            Feedback Type
            <nz-filter-trigger [(nzVisible)]="feedbackVisible" [nzDropdownMenu]="feedbackDropdown">
              <span nz-icon nzType="filter" nzTheme="fill"></span>
            </nz-filter-trigger>
          </th>

          <th nzWidth="170px" style="text-align: center; font-weight: bold" nzColumnKey="HOSPITAL_NAME"
            [nzSortFn]="true" [nzFilterFn]="true" nzCustomFilter>
            Hospital Name
            <nz-filter-trigger [(nzVisible)]="hospitalVisible" [nzDropdownMenu]="hospitalFilter">
              <span nz-icon nzType="filter" nzTheme="fill"></span>
            </nz-filter-trigger>
          </th>

          <!-- Doctor Name -->
          <th nzWidth="170px" style="text-align: center; font-weight: bold" nzColumnKey="DOCTOR_NAME" [nzSortFn]="true"
            [nzFilterFn]="true" nzCustomFilter>
            Doctor Name
            <nz-filter-trigger [(nzVisible)]="doctorVisible" [nzDropdownMenu]="doctorDropdown">
              <span nz-icon nzType="filter" nzTheme="fill"></span>
            </nz-filter-trigger>
          </th>



          <!-- Ratings -->
          <th nzWidth="30px" style="text-align: center; font-weight: bold" nzColumnKey="RATINGS" [nzSortFn]="true"
            [nzFilterFn]="true" nzCustomFilter>
            Ratings
            <nz-filter-trigger [(nzVisible)]="ratingVisible" [nzDropdownMenu]="ratingFilter">
              <span nz-icon nzType="filter" nzTheme="fill"></span>
            </nz-filter-trigger>
          </th>
          <th nzShowSort nzColumnKey="{{ 'COMMENTS' }}" nzWidth="300px" style="text-align: center" [nzSortFn]="true"
            nzCustomFilter>
            Comments
            <nz-filter-trigger [(nzVisible)]="commentvisible" [nzDropdownMenu]="commentdrop">
              <span nz-icon nzType="filter" nzTheme="fill"></span>
            </nz-filter-trigger>
          </th>

          <!-- Is Active -->
          <!-- <th
            nzWidth="9px"
            style="font-weight: bold; text-align: center"
            nzColumnKey="IS_ACTIVE"
            [nzSortFn]="true"
            [nzFilters]="listOfFilter"
            [nzFilterFn]="true"
            [nzFilterMultiple]="false"
            (nzFilterChange)="onActiveFilterChange($event)"
          >
            Status
          </th> -->
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of dataList">
          <!-- <td style="text-align: left; white-space: pre-line;">{{ data.APPOINTMENT_NAME }}</td> -->

          <td style="text-align: center">
            {{ data.DATE | date : "dd/MM/yyyy" }}
          </td>

          <td>
            <span *ngIf="data['FEEDBACK_TYPE'] == 'ON'">Online</span>
            <span *ngIf="data['FEEDBACK_TYPE'] == 'OF'">Offline</span>
            <span *ngIf="data['FEEDBACK_TYPE'] == 'null'">-</span>

          </td>
          <td style="text-align: left; white-space: pre-line">
            {{ data.HOSPITAL_NAME }}
          </td>
          <td style="text-align: left; white-space: pre-line">
            {{ data.DOCTOR_NAME }}
          </td>
          <!-- <td>{{ data.FEEDBACK_TYPE }}</td> -->
          <td style="text-align: center; white-space: pre-line">
            <nz-rate [ngModel]="(data.RATINGS / maxRating) * 5" nzAllowHalf [nzDisabled]="true"></nz-rate>
          </td>
          <td style="text-align: left; white-space: pre-line;">
            <span *ngIf="data['COMMENTS'] != 'null'">{{data.COMMENTS}}</span>
            <span *ngIf="data['COMMENTS'] == 'null'">-</span>

          </td>
          <!-- <td style="text-align: center">
            <i
              nz-icon
              *ngIf="data['IS_ACTIVE']"
              [nzType]="'check-circle'"
              [nzTheme]="'twotone'"
              [nzTwotoneColor]="'#52c41a'"
            ></i>
            <i
              nz-icon
              *ngIf="!data['IS_ACTIVE']"
              [nzType]="'close-circle'"
              [nzTheme]="'twotone'"
              [nzTwotoneColor]="'#f50'"
            ></i>
          </td> -->
        </tr>
      </tbody>
    </nz-table>

    <nz-option *ngFor="let status of listOfFilter" [nzValue]="status.value" [nzLabel]="status.text"></nz-option>

    <!-- Hospital Filter -->
    <nz-dropdown-menu #hospitalFilter="nzDropdownMenu">
      <div class="ant-table-filter-dropdown">
        <div class="select">
          <nz-select style="width: 100%" nzShowSearch nzAllowClear nzPlaceHolder="Select Hospital" nzMode="multiple"
            [nzCustomTemplate]="multipleTemplate" [(ngModel)]="selectedHospitals"
            (ngModelChange)="onHospitalFilterChange()">
            <nz-option *ngFor="let data of hospitalIdList" [nzValue]="data.ID" [nzLabel]="data.NAME"></nz-option>
          </nz-select>
          <ng-template #multipleTemplate let-selected>
            <div class="ant-select-selection-item-content">
              <span nz-icon [nzType]="selected.nzValue"></span>
              {{ selected.nzLabel }}
            </div>
          </ng-template>
        </div>
      </div>
    </nz-dropdown-menu>

    <nz-dropdown-menu #doctorDropdown="nzDropdownMenu">
      <div class="ant-table-filter-dropdown">
        <div class="select">
          <nz-select style="width: 100%" nzShowSearch nzAllowClear nzPlaceHolder="Select Doctor" nzMode="multiple"
            [(ngModel)]="doctorId" (ngModelChange)="onDoctorFilter()">
            <nz-option *ngFor="let data of doctorIdList" [nzValue]="data.ID" [nzLabel]="data.NAME"></nz-option>
          </nz-select>
        </div>
      </div>
    </nz-dropdown-menu>

    <nz-dropdown-menu #ratingFilter="nzDropdownMenu">
      <div class="ant-table-filter-dropdown">
        <nz-input-number nzPlaceHolder="Min Rating" [(ngModel)]="minRating" [nzMin]="1" [nzMax]="5"
          (ngModelChange)="onRatingFilter()"></nz-input-number>
      </div>
    </nz-dropdown-menu>

    <nz-dropdown-menu #dateshow="nzDropdownMenu">
      <div class="ant-table-filter-dropdown">
        <div class="search-box">
          <!-- Replacing input search box with a date picker -->
          <nz-date-picker [(ngModel)]="datefilter" name="Date" nzFormat="dd/MMM/yyyy" style="width: 100%" required
            (ngModelChange)="datechange($event)" placeholder="Select Holiday Date"></nz-date-picker>
        </div>
      </div>
    </nz-dropdown-menu>

    <nz-dropdown-menu #feedbackDropdown="nzDropdownMenu">
      <div class="ant-table-filter-dropdown">
        <div class="select">
          <nz-select style="width: 100%" nzShowSearch nzAllowClear nzPlaceHolder="Select Feedback Type"
            nzMode="multiple" [(ngModel)]="searchFeedback" (ngModelChange)="onFeedbackFilter($event)">
            <nz-option *ngFor="let data of feedbackTypeData" [nzValue]="data.value" [nzLabel]="data.TYPE"></nz-option>
          </nz-select>
        </div>
      </div>
    </nz-dropdown-menu>

    <nz-dropdown-menu #commentdrop="nzDropdownMenu">
      <div class="ant-table-filter-dropdown">
        <div class="search-box">
          <nz-input-group [nzSuffix]="inputcommentdrop">
            <input type="text" nz-input [(ngModel)]="commenttext" (onkeypress)="search()" (keyup)="onKeyup($event)"
              placeholder="Search Comments" />
          </nz-input-group>
          <ng-template #inputcommentdrop>
            <span nz-icon class="ant-input-clear-icon" nzTheme="fill" nzType="close-circle" *ngIf="commenttext"
              (click)="reset()"></span>
            <span nz-icon nzType="search" nzTheme="outline" *ngIf="commenttext == ''"></span>
          </ng-template>
        </div>
      </div>
    </nz-dropdown-menu>
  </div>
</div>
