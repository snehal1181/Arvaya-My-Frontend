<div>
  <form nz-form #websitebannerPage="ngForm">
    <nz-spin [nzSpinning]="isSpinning">
      <div nz-row>
        <div nz-col nzSpan="24">
          <nz-form-item>
            <nz-form-label nzRequired nzNoColon>Country Name</nz-form-label>
            <nz-form-control nzErrorTip="Please Enter Country Name">
              <input nz-input placeholder="Enter Country Name" name="name" required [(ngModel)]="data.name"
                (keypress)="commonFunction.alphaOnly($event)" #name="ngModel" maxlength="128" autocomplete="off" />
              <!-- <h6
                style="color: red; font-size: 10px"
                *ngIf="
                  data.NAME != undefined && data.NAME != null && data.NAME != ''
                "
              >
                {{ data.NAME.length }}/128
              </h6> -->
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row>
        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzNoColon>Short Code</nz-form-label>
            <nz-form-control nzErrorTip="Please Enter Short Code">
              <input nz-input placeholder="Enter Short Code" name="ShortCode" [(ngModel)]="data.code" #name="ngModel"
                maxlength="8" autocomplete="off" />
              <!-- <h6
                style="color: red; font-size: 10px"
                *ngIf="
                  data.NAME != undefined && data.NAME != null && data.NAME != ''
                "
              >
                {{ data.CODE.length }}/8
              </h6> -->
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col nzSpan="12">
          <nz-form-item>
            <nz-form-label nzNoColon nzRequired>Sequence No.</nz-form-label>
            <nz-form-control nzHasFeedback nzErrorTip="Please Enter Sequence No.">
              <input nz-input placeholder="Sequence No." name="SeqNo" required [(ngModel)]="data.seq_no" required
                (keypress)="commonFunction.onlynum($event)" maxlength="8" autocomplete="off" disabled />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div nz-col nzSpan="8">
        <nz-form-item>
          <nz-form-label nzNoColon>Status</nz-form-label>
          <nz-form-control>
            <nz-switch nzCheckedChildren="Active" nzUnCheckedChildren="Inactive" [(ngModel)]="data['is_active']"
              [ngModelOptions]="{ standalone: true }"></nz-switch>
          </nz-form-control>
        </nz-form-item>
      </div>
    </nz-spin>
  </form>

  <div class="footer">
    <button type="button" nz-button (click)="close()" class="ant-btn" style="margin-right: 8px">
      <span>Cancel</span>
    </button>

    <button type="button" class="ant-btn ant-btn-primary" *ngIf="!data.id" nz-button nz-dropdown [nzDropdownMenu]="menu"
      [nzLoading]="isSpinning" (click)="save(false, websitebannerPage)">
      <span>Save & Close</span>
    </button>

    <nz-dropdown-menu #menu="nzDropdownMenu">
      <ul nz-menu>
        <li nz-menu-item class="menuc" style="border-radius: 4px; background-color: #40a9ff">
          <a style="color: white" (click)="save(true, websitebannerPage)">Save & New</a>
        </li>
      </ul>
    </nz-dropdown-menu>

    <button type="button" class="ant-btn ant-btn-primary" nz-button [nzLoading]="isSpinning" *ngIf="data.id"
      (click)="save(false, websitebannerPage)">
      <span>Update & close</span>
    </button>
  </div>
</div>
