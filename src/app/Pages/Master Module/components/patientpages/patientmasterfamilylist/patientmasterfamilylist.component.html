<nz-spin nzTip="Loading..." [nzSpinning]="loadingRecords">


  <div nz-row>
    <div nz-col nzSpan="24" style="margin-bottom: 10px">
      <nz-form-item>
        <nz-input-group [nzPrefix]="prefixIconSearch" class="custom-search-input">
          <input type="text" name="search" (keyup)="keyup()" [(ngModel)]="searchText" nz-input
            placeholder="Search..." />
        </nz-input-group>
        <ng-template #prefixIconSearch>
          <span nz-icon nzType="search" class="search-icon"></span>
        </ng-template>
      </nz-form-item>
    </div>
    <div nz-col nzSpan="24" style="padding: 10px">
      <div class="cardstyle">
        <div style="text-align: center" (click)="addfamily()">
          <span nz-icon nzType="plus-circle" nzTheme="outline"
            style="font-size: 50px !important; color: #1890ff"></span>
        </div>
      </div>
    </div>
    <div nz-col nzSpan="24" *ngFor="let dataaa of data; let i = index" style="padding: 10px">
      <div nz-row>
        <div nz-col nzSpan="24" class="cardstyle">
          <div nz-row>
            <div class="mainnam" nz-col nzSpan="22" style="font-size: 13px !important">
              {{ dataaa.name }}
            </div>
            <div class="mainnam" nz-col nzSpan="2" style="font-size: 12px !important; text-align: end">
              <a (click)="edit(data,i)"><span nz-icon nzType="edit" nzTheme="twotone" style="font-size: 15px"
                  nzTooltipTitle="Edit" nz-tooltip></span></a>
            </div>
            <div class="subnamm" nz-col nzSpan="24" style="font-size: 12px !important">
              Mobile No. : {{ dataaa.mobile_number }}
            </div>

            <div class="subnamm" nz-col nzSpan="12" style="font-size: 12px !important">
              Relation : {{ dataaa.relation }}
            </div>
            <div class="subnamm" nz-col nzSpan="8" style="font-size: 12px !important">
              Blood Group : {{ dataaa.blood_group }}
            </div>
            <div class="subnamm" nz-col nzSpan="12" style="font-size: 12px !important">
              Gender : {{ dataaa.gender }}
            </div>

            <div class="subnamm" nz-col nzSpan="12" style="font-size: 12px !important">
              Status : <i nz-icon *ngIf="dataaa['is_active']" [nzType]="'check-circle'" [nzTheme]="'twotone'"
                [nzTwotoneColor]="'#52c41a'"></i>
              <i nz-icon *ngIf="!dataaa['is_active']" [nzType]="'close-circle'" [nzTheme]="'twotone'"
                [nzTwotoneColor]="'#f50'"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nz-spin>

<div *ngIf="familyvisible">
  <nz-drawer [nzBodyStyle]="{
        height: 'calc(100% - 55px)',
        overflow: 'auto',
        'padding-bottom': '53px'
      }" [nzClosable]="true" [nzMask]="true" [nzMaskClosable]="false" [nzWidth]="450" [nzVisible]="familyvisible"
    [nzTitle]="familytitle" (nzOnClose)="addfamilyclose()" (nzKeyboard)="(true)">
    <ng-container *nzDrawerContent>
      <app-patientmasterfamilyadd [drawerClose]="closeCallback" [data]="drawerdata" [patientId]="patientId">
      </app-patientmasterfamilyadd>
    </ng-container>
  </nz-drawer>
</div>
