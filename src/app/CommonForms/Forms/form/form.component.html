<div>
  <form nz-form nz-form #websitebannerPage="ngForm">
    <nz-spin [nzSpinning]="isSpinning">
      <div nz-row>
        <div nz-col nzSpan="24">
          <nz-form-item>
            <nz-form-label nzRequired nzNoColon>Parent Form </nz-form-label>

            <nz-input-group>
              <nz-select
                name="parent"
                nzShowSearch
                style="width: 100%"
                nzPlaceHolder="Select a Parent Form"
                [(ngModel)]="data.parent_id"
              >
                <nz-option
                  *ngFor="let form of forms"
                  [nzValue]="form.id"
                  [nzLabel]="form.name"
                >
                </nz-option>
                <nz-option nzValue="0" nzLabel="None"></nz-option>
              </nz-select>
            </nz-input-group>
          </nz-form-item>
        </div>
      </div>

      <div nz-row>
        <div nz-col nzSpan="24">
          <nz-form-item>
            <nz-form-label nzRequired nzNoColon>Name </nz-form-label>
            <nz-form-control nzHasFeedback nzErrorTip="Enter Name">
              <input
                nz-input
                name="name"
                placeholder="Enter Form Name"
                [(ngModel)]="data.name"
                maxlength="128"
                required
              />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row>
        <div nz-col nzSpan="24">
          <nz-form-item>
            <nz-form-label nzRequired nzNoColon>Link </nz-form-label>
            <nz-form-control nzErrorTip="Enter Link" nzHasFeedback>
              <input
                nz-input
                placeholder="Enter Link"
                name="link"
                [(ngModel)]="data.link"
                required
                maxlength="128"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row>
        <div nz-col nzSpan="24">
          <nz-form-item>
            <nz-form-label nzRequired nzNoColon>Icon </nz-form-label>
            <nz-form-control nzErrorTip="Enter Icon" nzHasFeedback>
              <input
                nz-input
                placeholder="Icon"
                name="icon"
                required
                maxlength="64"
                [(ngModel)]="data.icon"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </nz-spin>
  </form>

  <div class="footer">
    <button
      type="button"
      nz-button
      (click)="close()"
      class="ant-btn"
      style="margin-right: 8px"
    >
      <span>Cancel</span>
    </button>
    <button
      type="button"
      class="ant-btn ant-btn-primary"
      *ngIf="!data.id"
      nz-button
      nz-dropdown
      [nzDropdownMenu]="menu"
      [nzLoading]="isSpinning"
      (click)="save(false, websitebannerPage)"
    >
      <span>Save & Close</span>
    </button>
    <nz-dropdown-menu #menu="nzDropdownMenu">
      <ul nz-menu>
        <li
          nz-menu-item
          class="menuc"
          style="border-radius: 4px; background-color: #40a9ff"
        >
          <a style="color: white" (click)="save(true, websitebannerPage)"
            >Save & New</a
          >
        </li>
      </ul>
    </nz-dropdown-menu>
    <button
      type="button"
      class="ant-btn ant-btn-primary"
      nz-button
      [nzLoading]="isSpinning"
      *ngIf="data.id"
      (click)="save(false, websitebannerPage)"
    >
      <span>Update & Close</span>
    </button>
  </div>
</div>
