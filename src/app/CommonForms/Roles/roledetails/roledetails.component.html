<div nz-row>
  <div nz-col nzSpan="24" style="display: flex; justify-content: right">
    <form nz-form [nzLayout]="'inline'">
      <nz-form-item>
        <nz-input-group [nzPrefix]="prefixIconSearch" class="custom-search-input">
          <input type="text" name="postsearch" [(ngModel)]="searchText" (ngModelChange)="searchGoods($event)" nz-input
            placeholder="Search Record" />
        </nz-input-group>
        <ng-template #prefixIconSearch>
          <span nz-icon nzType="search" class="search-icon"></span>
        </ng-template>
      </nz-form-item>
    </form>
  </div>
</div>

<div nz-row>
  <div nz-col nzSpan="24">
    <nz-table class="my-scroll no-wrap1" [nzLoading]="loadForm" nzBordered #table [nzData]="roleDetailsData"
      [nzSize]="'small'" [nzFrontPagination]="false" style="white-space: pre-line">
      <thead>
        <tr>
          <th nzWidth="100px">Is Allowed</th>
          <th nzWidth="130px">Is Show In Menu</th>
          <th nzWidth="180px">Form Name</th>
          <th nzWidth="150px">Link</th>
          <th nzWidth="90px">Seq. No.</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let data of table.data; let i = index">
          <td align="center" style="white-space: pre-line">
            <nz-switch name="is_allowed" (ngModelChange)="event1($event, i)" [(ngModel)]="data['is_allowed']">
            </nz-switch>
          </td>

          <td align="center" style="white-space: pre-line">
            <nz-switch name="show_in_menu" (ngModelChange)="event2($event, i)" [(ngModel)]="data.show_in_menu">
            </nz-switch>
          </td>

          <td style="white-space: pre-line">{{ data.name }}</td>
          <td style="white-space: pre-line">{{ data.link }}</td>

          <td style="white-space: pre-line">
            <input nz-input name="saq_no" maxlength="10" (ngModelChange)="event3($event, i)"
              [(ngModel)]="data.seq_no" />
          </td>
        </tr>
      </tbody>
    </nz-table>
  </div>
</div>

<div class="footer">
  <button type="button" nz-button (click)="close()" class="ant-btn" style="margin-right: 8px">
    <span>Cancel</span>
  </button>

  <button type="button" class="ant-btn ant-btn-primary" nz-button [nzLoading]="isSpinning" *ngIf="data.id"
    (click)="save()">
    <span>Save & Close</span>
  </button>
</div>
