<div nz-row nzType="flex">
  <div nz-col nzXs="24" nzSm="24" nzMd="8" nzLg="7" nzXl="11">
    <div class="formname">
      <b> {{ formTitle }} </b>
    </div>
  </div>

  <div nz-col nzXs="24" nzSm="24" nzMd="16" nzLg="17" nzXl="13" class="flex-end">
    <form nz-form [nzLayout]="'inline'" class="w-100">
      <nz-row nzGutter="[8, 8]" class="w-100">
        <nz-col nzXs="24" nzSm="16" nzMd="16" nzLg="15" nzXl="15">
          <nz-form-item>
            <nz-input-group nzSearch [nzAddOnAfter]="suffixIconButton" class="w-100">
              <input type="text" name="search" [(ngModel)]="searchText" nz-input placeholder="Min 3 chars required" />
            </nz-input-group>
            <ng-template #suffixIconButton>
              <button nz-button nzType="primary" (click)="search(true)" nzSearch>
                <i nz-icon nzType="search"></i>
              </button>
            </ng-template>
          </nz-form-item>
        </nz-col>
        <nz-col nzXs="24" nzSm="8" nzMd="8" nzLg="9" nzXl="9">
          <nz-form-item class="mr-0">
            <button nz-button nzType="primary" id="search" (click)="add()" nzJustify="end" class="w-100">
              <i nz-icon nzType="plus"></i>Add New Role
            </button>
          </nz-form-item>
        </nz-col>
      </nz-row>
    </form>
  </div>
</div>

<div nz-row class="mt-10">
  <div nz-col nzSpan="24">
    <nz-table class="my-table" #table nzShowSizeChanger [nzFrontPagination]="false" [nzData]="dataList"
      [nzLoading]="loadingRecords" [nzTotal]="totalRecords" [(nzPageIndex)]="pageIndex" [(nzPageSize)]="pageSize"
      (nzPageIndexChange)="search()" (nzPageSizeChange)="search(true)" (nzQueryParams)="sort($event)"
      [nzSize]="'middle'" [nzScroll]="{ x: '800px' }">
      <thead nzSingleSort>
        <tr>
          <th nzWidth="70px" style="text-align: center">Action</th>
          <th nzWidth="70px" style="text-align: center">Forms</th>
          <th nzWidth="150px" nzShowSort align="center" nzColumnKey="parent_name" [nzSortFn]="true">
            Parent
          </th>
          <th nzWidth="170px" nzColumnKey="name" [nzSortFn]="true">Name</th>
          <th nzWidth="320px" nzColumnKey="description" [nzSortFn]="true">
            Description
          </th>
          <th nzWidth="90px" nzShowSort align="center" nzColumnKey="type" [nzSortFn]="true">
            Type
          </th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let data of table.data">
          <td align="center">
            <a (click)="edit(data)" class="edit-action">
              <span nz-icon nzType="edit" nzTheme="outline" nzTooltipTitle="Edit" nz-tooltip></span>
            </a>
          </td>

          <td align="center">
            <a (click)="MapForms(data)">
              <span nz-icon nzType="form" nzTheme="outline" class="fs-15 outline-color" nzTooltipTitle="Form Mapping"
                nz-tooltip></span>
            </a>
          </td>
          <td align="left" class="w-space-pre-line">
            <span *ngIf="data.parent_id != 0">{{ data.parent_name }}</span>
            <span *ngIf="data.parent_id == 0">None</span>
          </td>
          <td align="left">{{ data.name }}</td>

          <td align="left">
            <span nzPopoverPlacement="top" nz-popover [nzPopoverContent]="popoverContent"
              nzPopoverOverlayClassName="custom-popover" class="descreption-ellipsis">
              {{ data.description }}
            </span>
          </td>
          <td align="center">{{ data.type }}</td>
          <!-- Popover Content Template -->
          <ng-template #popoverContent>
            <span class="custom-popover-content">{{ data.description }}</span>
          </ng-template>
        </tr>
      </tbody>
    </nz-table>
  </div>
</div>

<div *ngIf="drawerVisible">
  <nz-drawer [nzBodyStyle]="{
      height: 'calc(100% - 55px)',
      overflow: 'auto',
      'padding-bottom': '53px'
    }" [nzClosable]="true" [nzMask]="true" [nzMaskClosable]="false" [nzWidth]="320" [nzVisible]="drawerVisible"
    [nzTitle]="drawerTitle" (nzOnClose)="drawerClose()" (nzKeyboard)="(true)">
    <ng-container *nzDrawerContent>
      <app-role [drawerClose]="closeCallback" [data]="drawerData"></app-role>
    </ng-container>
  </nz-drawer>
</div>

<div *ngIf="drawerVisible1">
  <nz-drawer [nzBodyStyle]="{
      height: 'calc(100% - 55px)',
      overflow: 'auto',
      'padding-bottom': '53px'
    }" [nzClosable]="true" [nzMask]="true" [nzMaskClosable]="false" [nzWidth]="1000" [nzVisible]="drawerVisible1"
    [nzTitle]="drawerTitle1" (nzOnClose)="drawerClose1()" (nzKeyboard)="(true)">
    <ng-container *nzDrawerContent>
      <app-roledetails [drawerClose]="closeCallback1" [data]="drawerData1" [MapData]="MapData" [loadForm]="loadForm"
        [roleDetailsData]="drawerData2">
      </app-roledetails>
    </ng-container>
  </nz-drawer>
</div>
